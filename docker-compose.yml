x-app-dns: &app-dns
  dns:
    - 8.8.8.8
    - 8.8.4.4
    - 1.1.1.1

services:
  db:
    image: postgres:14-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    env_file:
      - ./app.env
    ports:
      - "5432:5432"

  redis:
    image: redis:6-alpine

  web:
    build: .
    entrypoint: ["bash", "/app/docker-entrypoint.sh"]
    command: >
      sh -c "
        while ! nc -z db 5432; do sleep 0.1; done &&
        python manage.py migrate &&
        gunicorn tax_service.wsgi:application --bind 0.0.0.0:8000 --workers 4
      "
    volumes:
      - .:/app
      - ./media:/app/media
      # Только ключи с хоста; /etc/opt/cprocsp и остальной /var/opt/cprocsp — из образа
      - /var/opt/cprocsp/keys:/var/opt/cprocsp/keys
    ports:
      - "8000:8000"
    env_file:
      - ./app.env
    depends_on:
      - db
      - redis
    user: root
    dns: *app-dns

  worker:
    build: .
    entrypoint: ["bash", "/app/docker-entrypoint.sh"]
    command: celery -A tax_service worker -l info
    volumes:
      - .:/app
      - /var/opt/cprocsp/keys:/var/opt/cprocsp/keys
    env_file:
      - ./app.env
    depends_on:
      - redis
      - db
    user: root
    dns: *app-dns

  beat:
    build: .
    entrypoint: ["bash", "/app/docker-entrypoint.sh"]
    command: celery -A tax_service beat -l info
    volumes:
      - .:/app
      - /var/opt/cprocsp/keys:/var/opt/cprocsp/keys
    env_file:
      - ./app.env
    depends_on:
      - redis
      - db
    user: root
    dns: *app-dns

volumes:
  postgres_data:
